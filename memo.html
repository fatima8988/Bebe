<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Memories 🌸</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css?v=99999" />
</head>

<body>
  <div class="hearts" aria-hidden="true"></div>

  <div class="container" style="max-width: 900px; width: 100%;">
    <h1>Memories 🌸</h1>

    <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap; align-items:center;">
      <button id="loginBtn">Sign in with Google</button>
      <button id="logoutBtn" class="ghost hidden">Sign out</button>
      <span id="who"></span>
    </div>

    <hr style="margin: 24px 0; opacity: 0.2;" />

    <div id="appArea" class="hidden">
      <div class="card" style="margin-bottom: 18px; text-align:left;">
        <h2 style="margin-top:0; text-align:center;">Add a memory</h2>

        <input id="title" placeholder="Title (ex: Movie Night)"
          style="width:100%; padding:12px; border-radius:12px; border:1px solid #ffd1e3; margin-bottom:10px;" />

        <textarea id="description" placeholder="What happened? 🥺"
          style="width:100%; padding:12px; border-radius:12px; border:1px solid #ffd1e3; min-height:110px; margin-bottom:10px;"></textarea>

        <!-- Photo upload (real file) -->
        <input id="imageFile" type="file" accept="image/*"
            style="width:100%; padding:12px; border-radius:12px; border:1px solid #ffd1e3; margin-bottom:10px;" />

        <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center; justify-content:center;">
          <button id="addBtn">Add Memory</button>
          <span id="status"></span>
        </div>
      </div>

      <div id="memoriesList" class="cards" style="flex-wrap:wrap; justify-content:center;"></div>
    </div>

    <p style="margin-top:20px; text-align:center;">
      <button type="button" class="ghost backBtn" onclick="location.href='./index.html#main'">
        ← back home
      </button>
    </p>
  </div>

  <script type="module" src="memories.js?v=99999"></script>
</body>
</html>
